<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Bankruptcy Shield</title>
    <style>
        :root {
            --primary: #4361ee;
            --dark: #1a1a2e;
            --bg: #f4f7fe;
            --error: #ef4444;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }

        body { 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            padding: 20px;
        }

        .reset-card {
            background: #fff;
            padding: 45px;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid #eef0f7;
        }

        .icon-circle {
            width: 70px;
            height: 70px;
            background: #f0f3ff;
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            margin: 0 auto 25px;
        }

        h2 { font-size: 1.7rem; color: var(--dark); margin-bottom: 12px; }
        p { color: #64748b; font-size: 0.95rem; margin-bottom: 30px; line-height: 1.5; }

        /* Alert Messages */
        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            text-align: center;
            font-weight: 500;
        }
        .alert-error { background: #fee2e2; color: var(--error); border: 1px solid #fecaca; }
        .alert-success { background: #dcfce7; color: var(--success); border: 1px solid #bbf7d0; }

        .form-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: #475569; }
        
        input {
            width: 100%;
            padding: 13px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
            font-size: 1rem;
            background: #fcfcfd;
        }

        input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.08);
        }

        .btn-update {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-update:hover {
            background: #3751d4;
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.2);
        }

        .back-to-login {
            margin-top: 25px;
            display: block;
            text-decoration: none;
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.2s;
        }

        .back-to-login:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="reset-card">
        <div class="icon-circle">🔐</div>
        <h2>Reset Password</h2>
        <p>Set a strong new password to secure your ML Bankruptcy Shield</span>.</p>

        <!-- Flask Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('reset_password') }}" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Your registered email" required>
            </div>

            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password" placeholder="Min 8 characters" required minlength="8">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="Repeat password" required>
            </div>

            <button type="submit" class="btn-update">Update Password</button>
        </form>

        <a href="{{ url_for('login') }}" class="back-to-login">← Cancel and Back to Login</a>
    </div>

</body>
</html>
